version: "3.8"

services:
  bbc-noticias:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bbc-noticias
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DRY_RUN=${DRY_RUN:-false}
    volumes:
      # Persist state (seen articles, logs, etc.) across runs
      - ./data:/app/data
