version: "3.8"

services:
  bbc-noticias:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bbc-noticias
    # No restart policy — run once per cron tick, then stop.
    # Schedule this via OpenClaw cron, system cron, or a cron container.
    env_file:
      - .env
    environment:
      - DRY_RUN=${DRY_RUN:-false}
    volumes:
      # Persist state (seen articles, logs, etc.) across runs
      - ./data:/app/data
