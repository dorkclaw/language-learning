services:
  bbc-noticias:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bbc-noticias
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DRY_RUN=${DRY_RUN:-false}
    volumes:
      # Mount crontab into app dir; entrypoint copies to /etc/cron.d/ with correct ownership
      - ./crontab:/app/crontab:ro
      # Persist state (seen articles, logs, etc.) across runs
      - ./data:/app/data
      - ./.env:/app/.env
    entrypoint: /app/entrypoint.sh